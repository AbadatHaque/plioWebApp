<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Abadat Haque - Web Developer Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Abadat Haque, a passionate web developer specializing in modern, fast, and responsive websites using React, Vite, and JavaScript. View projects, skills, and contact information."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://abadat.dev/" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/jpeg"
      href="https://abadat.dev/static/profile.jpg"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://abadat.dev/" />
    <meta
      property="og:title"
      content="Abadat Haque - Web Developer Portfolio"
    />
    <meta
      property="og:description"
      content="Portfolio of Abadat Haque, showcasing web development projects and skills in React and Vite."
    />
    <meta property="og:image" content="https://abadat.dev/static/profile.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://abadat.dev/" />
    <meta
      name="twitter:title"
      content="Abadat Haque - Web Developer Portfolio"
    />
    <meta
      name="twitter:description"
      content="Showcasing projects, skills, and contact info for Abadat Haque, web developer."
    />
    <meta
      name="twitter:image"
      content="https://abadat.dev/static/profile.jpg"
    />

    <!-- Structured Data for Google -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Sk Abadat Haque",
        "url": "https://abadat.dev/",
        "image": "https://abadat.dev/static/profile.jpg",
        "sameAs": [
          "https://github.com/AbadatHaque",
          "www.linkedin.com/in/abadat-dev"
        ],
        "jobTitle": "Web Developer",
        "worksFor": {
          "@type": "Organization",
          "name": "Freelance"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
